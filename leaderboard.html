<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Classifica Wordman</title>
    <link rel="stylesheet" href="style.css">
	<style>
		/* Stile coerente con il resto del gioco */
		.back-btn {
			background-color: #1e1e1f;
			color: #888;
			border: 1px solid #3a3a3c;
			padding: 10px 20px;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
			border-radius: 4px;
			margin-top: 20px;
			transition: 0.2s;
		}
		.back-btn:hover {
			background-color: #3a3a3c;
			color: white;
		}
	</style>

	<button class="back-btn" onclick="window.location.href='index.html'">↩ Torna al Gioco</button>
</head>
<body>
    <div class="leaderboard-container">
        <h2>🏆 Classifica Mondiale</h2>
        <table id="leaderboard-table">
            <thead><tr><th>Pos</th><th>Giocatore</th><th>Punti</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <br>
        <button onclick="window.location.href='index.html'">Torna al Gioco</button>
    </div>

    <script src="online-leaderboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const body = document.getElementById("leaderboard-body");
            const data = await ONLINE_LEADERBOARD.getLeaderboardData();

            if (!data) {
                body.innerHTML = "<tr><td colspan='3'>Errore nel caricamento. Riprova più tardi.</td></tr>";
                return;
            }

            // Render Primi 10
            data.top10.forEach(p => {
                const tr = document.createElement("tr");
                if (p.isCurrentUser) tr.className = "row-current-user";
                tr.innerHTML = `<td>${p.rank}°</td><td>${p.username}</td><td>${p.score}</td>`;
                body.appendChild(tr);
            });

            // Render riga utente se fuori top 10
            if (data.currentUserRow && data.currentUserRow.rank > 10) {
                body.innerHTML += "<tr class='dots-row'><td colspan='3'>...</td></tr>";
                const tr = document.createElement("tr");
                tr.className = "row-current-user";
                tr.innerHTML = `<td>${data.currentUserRow.rank}°</td><td>${data.currentUserRow.username} (Tu)</td><td>${data.currentUserRow.score}</td>`;
                body.appendChild(tr);
            }
        });
    </script>
</body>
</html>
